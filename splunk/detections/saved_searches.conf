[AgentShield - Prompt Injection Detection]
search = index=ai_agent_logs | eval prompt_lower=lower(prompt) | where like(prompt_lower, "%ignore previous instructions%") OR like(prompt_lower, "%reveal your system prompt%") OR like(prompt_lower, "%bypass policy%") OR like(prompt_lower, "%developer message%") | table _time agent_name session_id user_id source_ip prompt tool_requested severity
description = Detects known prompt injection keywords in AI agent prompts.
enableSched = 1
cron_schedule = * * * * *
action.email.sendresults = 0

[AgentShield - Sensitive Tool Abuse]
search = index=ai_agent_logs | search tool_requested IN ("crm.export_all_customers", "read_secrets", "delete_user", "refund_payment") | stats count values(prompt) as prompts values(tool_allowed) as allowed by agent_name session_id user_id tool_requested | where count > 0
description = Flags whenever an AI agent attempts to use a highly sensitive tool.
enableSched = 1
cron_schedule = * * * * *

[AgentShield - PII or Secret Leakage]
search = index=ai_agent_logs | regex response="(?i)(api[_-]?key|secret|token|ssn|credit card|password|customer email)" | table _time agent_name session_id user_id response severity
description = Scans agent responses for potential secrets or PII leakage.
enableSched = 1
cron_schedule = * * * * *

[AgentShield - Token-Cost Anomaly]
search = index=ai_agent_logs | eval total_tokens=tokens_prompt+tokens_completion | eventstats avg(total_tokens) as avg_tokens stdev(total_tokens) as stdev_tokens by agent_name | eval z_score=if(stdev_tokens>0,(total_tokens-avg_tokens)/stdev_tokens,0) | where z_score > 3 OR total_tokens > 5000 | table _time agent_name session_id total_tokens z_score estimated_cost_usd
description = Detects sessions with unusually high token counts and cost compared to the agent's baseline.
enableSched = 1
cron_schedule = 0 * * * *

[AgentShield - Combined Risk Score]
search = index=ai_agent_logs | eval risk_score=0 | eval risk_score=risk_score+if(injection_score>=70,40,0) | eval risk_score=risk_score+if(tool_requested IN ("crm.export_all_customers","read_secrets","delete_user"),30,0) | eval risk_score=risk_score+if(pii_detected="true" OR secret_detected="true",30,0) | eval risk_score=risk_score+if(tokens_prompt+tokens_completion>5000,10,0) | eval severity=case(risk_score>=80,"critical",risk_score>=50,"high",risk_score>=25,"medium",true(),"low") | table _time agent_name session_id user_id risk_score severity risk_type prompt tool_requested
description = Calculates an aggregated risk score based on multiple risk factors.
enableSched = 1
cron_schedule = * * * * *
