# AgentShield for Splunk — Saved Searches
# Import via: Settings > Searches, Reports, and Alerts > Import
# All searches run against index=ai_agent_logs

# ─────────────────────────────────────────────────────────────────────────────
#  DETECTION 1 — Prompt Injection
# ─────────────────────────────────────────────────────────────────────────────
[AgentShield - Prompt Injection Detection]
search = index=ai_agent_logs \
| eval prompt_lower=lower(prompt) \
| where like(prompt_lower, "%ignore previous instructions%") \
    OR like(prompt_lower, "%reveal your system prompt%") \
    OR like(prompt_lower, "%bypass policy%") \
    OR like(prompt_lower, "%developer message%") \
    OR like(prompt_lower, "%override instructions%") \
    OR injection_score >= 70 \
| table _time agent_name session_id user_id source_ip prompt tool_requested injection_score severity
description = Detects known prompt injection keywords and high injection scores in AI agent prompts.
enableSched = 1
cron_schedule = * * * * *
action.email.sendresults = 0

# ─────────────────────────────────────────────────────────────────────────────
#  DETECTION 2 — Sensitive Tool Abuse
# ─────────────────────────────────────────────────────────────────────────────
[AgentShield - Sensitive Tool Abuse]
search = index=ai_agent_logs \
| search tool_requested IN ("crm.export_all_customers", "crm.export_users", "read_secrets", "get_credentials", "dump_env", "delete_user", "refund_payment") \
| stats count values(prompt) as prompts values(tool_allowed) as allowed \
    by agent_name session_id user_id tool_requested \
| where count > 0
description = Flags whenever an AI agent attempts to use a highly sensitive or dangerous tool.
enableSched = 1
cron_schedule = * * * * *

# ─────────────────────────────────────────────────────────────────────────────
#  DETECTION 3 — PII or Secret Leakage
# ─────────────────────────────────────────────────────────────────────────────
[AgentShield - PII or Secret Leakage]
search = index=ai_agent_logs \
| where pii_detected="true" OR secret_detected="true" \
    OR match(response, "(?i)(api[_-]?key|secret|token|ssn|credit.card|password|customer.email)") \
| table _time agent_name session_id user_id pii_detected secret_detected response severity
description = Scans agent responses for PII flags, secret flags, and sensitive data patterns.
enableSched = 1
cron_schedule = * * * * *

# ─────────────────────────────────────────────────────────────────────────────
#  DETECTION 4 — Token-Cost Anomaly (3-sigma)
# ─────────────────────────────────────────────────────────────────────────────
[AgentShield - Token-Cost Anomaly]
search = index=ai_agent_logs \
| eval total_tokens=tokens_prompt+tokens_completion \
| eventstats avg(total_tokens) as avg_tokens stdev(total_tokens) as stdev_tokens by agent_name \
| eval z_score=if(stdev_tokens>0,(total_tokens-avg_tokens)/stdev_tokens,0) \
| where z_score > 3 OR total_tokens > 5000 OR estimated_cost_usd > 1.0 \
| table _time agent_name session_id user_id total_tokens z_score estimated_cost_usd session_cost_total_usd baseline_anomalies
description = Detects sessions with token counts or costs exceeding 3-sigma baselines or hard thresholds.
enableSched = 1
cron_schedule = 0 * * * *

# ─────────────────────────────────────────────────────────────────────────────
#  DETECTION 5 — Combined Risk Score
# ─────────────────────────────────────────────────────────────────────────────
[AgentShield - Combined Risk Score]
search = index=ai_agent_logs \
| eval risk_score=0 \
| eval risk_score=risk_score+if(injection_score>=70,40,0) \
| eval risk_score=risk_score+if(tool_requested IN ("crm.export_all_customers","crm.export_users","read_secrets","get_credentials","dump_env","delete_user"),30,0) \
| eval risk_score=risk_score+if(pii_detected="true" OR secret_detected="true",30,0) \
| eval risk_score=risk_score+if(tokens_prompt+tokens_completion>5000,10,0) \
| eval risk_score=risk_score+if(hallucination_score>=0.7,15,0) \
| eval risk_score=risk_score+if(mvcount(policy_violations)>0,10,0) \
| eval severity=case(risk_score>=80,"critical",risk_score>=50,"high",risk_score>=25,"medium",true(),"low") \
| table _time agent_name session_id user_id risk_score severity risk_type prompt tool_requested policy_violations hallucination_score
description = Calculates an aggregated risk score including V4 hallucination and policy violation signals.
enableSched = 1
cron_schedule = * * * * *

# ─────────────────────────────────────────────────────────────────────────────
#  DETECTION 6 — Hallucination Risk (V4)
# ─────────────────────────────────────────────────────────────────────────────
[AgentShield - Hallucination Risk]
search = index=ai_agent_logs \
| where hallucination_score >= 0.7 OR hallucination_risk="high" \
| eval grounding_status=if(context_grounded="true","Grounded","Ungrounded") \
| table _time agent_name session_id user_id model prompt response hallucination_score hallucination_risk quality_score grounding_status
description = Flags AI agent responses with high hallucination risk scores or ungrounded context.
enableSched = 1
cron_schedule = * * * * *
action.email.sendresults = 0

# ─────────────────────────────────────────────────────────────────────────────
#  DETECTION 7 — Policy Violation (V4)
# ─────────────────────────────────────────────────────────────────────────────
[AgentShield - Policy Violation]
search = index=ai_agent_logs \
| where mvcount(policy_violations) > 0 \
| eval violation_count=mvcount(policy_violations) \
| eval triggered_policies=mvjoin(policy_violations, ", ") \
| table _time agent_name session_id user_id source_ip triggered_policies policy_action violation_count severity risk_type
description = Detects events where one or more policy-as-code rules were triggered by the AgentShield policy engine.
enableSched = 1
cron_schedule = * * * * *

# ─────────────────────────────────────────────────────────────────────────────
#  DETECTION 8 — Budget Violation (V5)
# ─────────────────────────────────────────────────────────────────────────────
[AgentShield - Budget Violation]
search = index=ai_agent_logs \
| where mvcount(budget_violations) > 0 \
| eval violation_types=mvjoin(budget_violations, ", ") \
| table _time agent_name session_id user_id model tokens_prompt tokens_completion estimated_cost_usd session_tokens_total session_cost_total_usd violation_types
description = Detects sessions that have exceeded per-session or daily token/cost budget limits.
enableSched = 1
cron_schedule = */5 * * * *

# ─────────────────────────────────────────────────────────────────────────────
#  DETECTION 9 — Behavioral Baseline Anomaly (V5)
# ─────────────────────────────────────────────────────────────────────────────
[AgentShield - Behavioral Baseline Anomaly]
search = index=ai_agent_logs \
| where mvcount(baseline_anomalies) > 0 \
| eval anomaly_count=mvcount(baseline_anomalies) \
| eval anomalous_metrics=mvjoin(baseline_anomalies, ", ") \
| eventstats avg(latency_ms) as avg_latency stdev(latency_ms) as stdev_latency by agent_name \
| eventstats avg(risk_score) as avg_risk stdev(risk_score) as stdev_risk by agent_name \
| eval latency_z=if(stdev_latency>0,(latency_ms-avg_latency)/stdev_latency,0) \
| eval risk_z=if(stdev_risk>0,(risk_score-avg_risk)/stdev_risk,0) \
| where anomaly_count > 0 \
| table _time agent_name session_id user_id model anomalous_metrics anomaly_count latency_ms latency_z risk_score risk_z estimated_cost_usd
description = Identifies events where one or more telemetry metrics deviate beyond the 3-sigma behavioral baseline.
enableSched = 1
cron_schedule = */10 * * * *
